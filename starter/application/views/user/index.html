<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>{{ .Title }}</h1>
            <a href="{{site_url "user/add"}}" class="btn btn-primary">Add User</a>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {{range .Users}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>{{.Email}}</td>
                <td>{{.CreatedAt.Format "2006-01-02 15:04"}}</td>
                <td>
                    <a href="{{site_url "user/show/"}}{{.ID}}" class="btn btn-sm btn-info">View</a>
                    <a href="{{site_url "user/edit/"}}{{.ID}}" class="btn btn-sm btn-warning">Edit</a>
                    <button class="btn btn-sm btn-danger btn-delete" data-id="{{.ID}}">Delete</button>
                </td>
            </tr>
            {{else}}
            <tr>
                <td colspan="5" class="text-center">No users found</td>
            </tr>
            {{end}}
            </tbody>
        </table>

        <a href="{{site_url "welcome/index"}}" class="btn btn-secondary">Back to Home</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
    $('.btn-delete').on('click', function() {
        if (confirm('Are you sure you want to delete this user?')) {
            var id = $(this).data('id');
            $.ajax({
                url: '{{site_url "user/delete/"}}' + id,
                type: 'POST',
                success: function() {
                    location.reload();
                },
                error: function() {
                    alert('Failed to delete user');
                }
            });
        }
    });
    </script>
</body>
</html>
