<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>{{ .Title }}</h1>

        <div class="card mt-4">
            <div class="card-body">
                <table class="table table-bordered">
                    <tr>
                        <th style="width: 150px;">ID</th>
                        <td>{{.User.ID}}</td>
                    </tr>
                    <tr>
                        <th>Name</th>
                        <td>{{.User.Name}}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{.User.Email}}</td>
                    </tr>
                    <tr>
                        <th>Created At</th>
                        <td>{{.User.CreatedAt.Format "2006-01-02 15:04:05"}}</td>
                    </tr>
                    <tr>
                        <th>Updated At</th>
                        <td>{{.User.UpdatedAt.Format "2006-01-02 15:04:05"}}</td>
                    </tr>
                </table>

                <div class="d-flex gap-2">
                    <a href="{{site_url "user/index"}}" class="btn btn-secondary">Back</a>
                    <a href="{{site_url "user/edit/"}}{{.User.ID}}" class="btn btn-warning">Edit</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
