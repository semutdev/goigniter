<!-- Modal Header -->
<div class="modal-header">
    <h5 class="modal-title">{{ .Title }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<!-- Modal Body -->
<div class="modal-body">
    <form id="userForm" hx-post="{{site_url "admin/user/store"}}" hx-target="#modalContent">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control {{if .Errors.Email}}is-invalid{{end}}"
                        id="email" name="email" value="{{.Values.Email}}" required>
                    {{if .Errors.Email}}
                    <div class="invalid-feedback">{{.Errors.Email}}</div>
                    {{end}}
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                    <input type="password" class="form-control {{if .Errors.Password}}is-invalid{{end}}"
                        id="password" name="password" value="{{.Values.Password}}" required>
                    {{if .Errors.Password}}
                    <div class="invalid-feedback">{{.Errors.Password}}</div>
                    {{else}}
                    <div class="form-text">Minimal 6 karakter</div>
                    {{end}}
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name"
                        value="{{.Values.FirstName}}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name"
                        value="{{.Values.LastName}}">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="company" class="form-label">Company</label>
                    <input type="text" class="form-control" id="company" name="company"
                        value="{{.Values.Company}}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone"
                        value="{{.Values.Phone}}">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="active" id="active1" value="1"
                    {{if .Values.Active}}checked{{end}}>
                <label class="form-check-label" for="active1">Active</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="active" id="active0" value="0"
                    {{if not .Values.Active}}checked{{end}}>
                <label class="form-check-label" for="active0">Inactive</label>
            </div>
        </div>
    </form>
</div>

<!-- Modal Footer -->
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
    <button type="submit" form="userForm" class="btn btn-primary">
        <span class="htmx-indicator">
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </span>
        <i class="bi bi-save"></i> Simpan
    </button>
</div>
