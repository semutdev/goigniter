<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ .Title }}</h1>
    <a href="{{site_url "admin/user/index"}}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Kembali
    </a>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{site_url "admin/user/update/"}}{{.User.ID}}">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control {{if .Errors.Email}}is-invalid{{end}}"
                                    id="email" name="email" value="{{.Values.Email}}" required>
                                {{if .Errors.Email}}
                                <div class="invalid-feedback">{{.Errors.Email}}</div>
                                {{end}}
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control {{if .Errors.Password}}is-invalid{{end}}"
                                    id="password" name="password" value="{{.Values.Password}}">
                                {{if .Errors.Password}}
                                <div class="invalid-feedback">{{.Errors.Password}}</div>
                                {{else}}
                                <div class="form-text">Kosongkan jika tidak ingin mengubah password</div>
                                {{end}}
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="first_name" name="first_name"
                                    value="{{.Values.FirstName}}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="last_name" name="last_name"
                                    value="{{.Values.LastName}}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="company" class="form-label">Company</label>
                                <input type="text" class="form-control" id="company" name="company"
                                    value="{{.Values.Company}}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" name="phone"
                                    value="{{.Values.Phone}}">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <div>
                            {{range .User.Groups}}
                            <span class="badge bg-primary me-1">{{.Name}}</span>
                            {{else}}
                            <span class="badge bg-secondary">No Role</span>
                            {{end}}
                        </div>
                        <div class="form-text">Role tidak dapat diubah dari halaman ini</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="active" id="active1" value="1"
                                {{if .Values.Active}}checked{{end}}>
                            <label class="form-check-label" for="active1">
                                Active
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="active" id="active0" value="0"
                                {{if not .Values.Active}}checked{{end}}>
                            <label class="form-check-label" for="active0">
                                Inactive
                            </label>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{site_url "admin/user/index"}}" class="btn btn-secondary">Batal</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Update
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
